services:
  nckh:
    image: ghcr.io/frozenfrog/nckh:latest
    container_name: nckh
    hostname: nckh
    network_mode: bridge
    environment:
      DATABASE_URL: ${DATABASE_URL}
      PORT: 8080
    ports:
      - target: 8080
        published: "23180"
        protocol: tcp
    restart: on-failure
    labels:
      proxy.aliases: nckh
      proxy.#1.port: 23180