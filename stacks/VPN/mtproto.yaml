services:
  gluetun_mt:
    image: qmcgaw/gluetun:latest
    network_mode: bridge
    container_name: gluetun_mt
    hostname: gluetun_mt
    environment:
      # HTTPPROXY: "off"
      # HTTP_CONTROL_SERVER_ADDRESS: ":8000"
      # VPN_SERVICE_PROVIDER: expressvpn
      # OPENVPN_USER: ${OPENVPN_USER}
      # OPENVPN_PASSWORD: ${OPENVPN_PASSWORD}
      # SERVER_COUNTRIES: ${SERVER_COUNTRIES}
      VPN_SERVICE_PROVIDER: custom
      VPN_TYPE: wireguard
      WIREGUARD_ENDPOINT_IP: ${WIREGUARD_ENDPOINT_IP}
      WIREGUARD_ENDPOINT_PORT: 1337
      WIREGUARD_ADDRESSES: ${WIREGUARD_ADDRESSES}
      WIREGUARD_PRIVATE_KEY: ${WIREGUARD_PRIVATE_KEY}
      WIREGUARD_PUBLIC_KEY: ${WIREGUARD_PUBLIC_KEY}
      TZ: ${TZ}
    volumes:
      - type: bind
        source: "${BASEPATH}/${GLUETUN_CONFIG_PATH}"
        target: /gluetun
    restart: on-failure:10
    cap_add:
      - NET_ADMIN
    labels:
      proxy.exclude: true
  expressvpn:
    image: misioslav/expressvpn:latest
    container_name: expressvpn
    restart: unless-stopped
    ports:
      - target: 443
        published: "993"
        protocol: tcp
    environment:
      CODE: ${ACTIVATION_CODE}
      SERVER: smart #SERVER: ${SERVER_COUNTRIES} 
      PROTOCOL: wireguard
      ALLOW_LAN: false
      METRICS_PROMETHEUS: off
      CONTROL_SERVER: off
      SOCKS: off
      # Optional healthcheck/IP validation
      # - DDNS=yourDdnsDomain
      # - IP=yourStaticIp
      # - BEARER=ipInfoAccessToken
      # - HEALTHCHECK=healthchecks.ioId
      # Optional DNS whitelist
      # - WHITELIST_DNS=192.168.1.1,1.1.1.1
    cap_add:
      - NET_ADMIN
      - SYS_PTRACE
    devices:
      - /dev/net/tun
    stdin_open: true
    tty: true
    command: /bin/bash
    labels:
      proxy.aliases: mtg.picityvietnam.com
      proxy.#1.port: 993
      proxy.#1.no_tls_verify: true
    
  telemt:
    image: ghcr.io/telemt/telemt:latest
    container_name: telemt
    build: .
    restart: unless-stopped
    # Allow caching 'proxy-secret' in read-only container
    working_dir: /run/telemt
    # Use the gluetun_mt or expressvpn network so telemt's traffic goes through the VPN
    network_mode: "service:${VPN_PROVIDER}"
    tmpfs:
      - /run/telemt:rw,mode=1777,size=1m
    volumes:
      - type: bind
        source: "${BASEPATH}/${MTPROTO_CONFIG_PATH}/config.toml"
        target: /run/telemt/config.toml
        read_only: true
    environment:
      RUST_LOG: info
    # Uncomment this line if you want to use host network for IPv6, but bridge is default and usually better
    cap_drop:
      - all
    cap_add:
      - NET_BIND_SERVICE # allow binding to port 443
    read_only: true
    security_opt:
      - no-new-privileges:true
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    labels:
      proxy.exclude: true